name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NO_MKDOCS_2_WARNING: "1"

jobs:
  showcase-builds:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSYS2 GCC
        if: matrix.os == 'windows-2025-vs2026'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 GCC to PATH
        if: matrix.os == 'windows-2025-vs2026'
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Build all showcase programs through native backend path
        run: cargo test -q --test showcase_builds

  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests except codegen_e2e
        run: cargo test --workspace -q -- --skip e2e_

      - name: Sync docs sources
        run: python scripts/sync_docs_site.py

      - name: Build MkDocs site
        run: python -m mkdocs build --strict

  concurrency-tsan:
    runs-on: ubuntu-latest
    env:
      SKADI_REQUIRE_TSAN: "1"
      CC: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run required Task/Channel ThreadSanitizer stress
        run: cargo test --test task_model_sanitizer -- --nocapture

  native-compiler-matrix:
    needs: [quality-gates]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            msys2: false
            msvc: false
          - os: ubuntu-latest
            cc: clang
            msys2: false
            msvc: false
          - os: windows-2025-vs2026
            cc: gcc
            msys2: true
            msvc: false
          - os: windows-2025-vs2026
            cc: cl
            msys2: false
            msvc: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSYS2 GCC
        if: matrix.msys2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 GCC to PATH
        if: matrix.msys2
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Enable MSVC developer environment
        if: matrix.msvc
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build and run systems project with selected compiler
        shell: pwsh
        run: |
          $projectDir = Join-Path $env:RUNNER_TEMP "skadi_systems_${{ matrix.cc }}"
          New-Item -ItemType Directory -Force -Path $projectDir | Out-Null
          Set-Location $projectDir

          cargo run --manifest-path "$env:GITHUB_WORKSPACE/Cargo.toml" -p skadi-cli -- init
          @'
          struct Reading {
              Int id
              Float value
          }

          fn produce(Channel(Reading) readings) {
              new Reading item = {id = 7, value = 12.5}
              readings.send(item)
          }

          fn consume(Channel(Reading) readings) Int {
              new Reading item = readings.receive()
              return item.id
          }

          Memory report_memory = memory(4kb)
          Channel(Reading) readings = channel(1)
          Task producer_task = run produce(readings)
          Task(Int) consumer_task = run consume(readings)
          wait producer_task
          new Int result = wait consumer_task
          output(result)
          place in report_memory {
              output("systems matrix ok")
          }
          '@ | Set-Content -Encoding utf8 src/main.skd

          cargo run --manifest-path "$env:GITHUB_WORKSPACE/Cargo.toml" -p skadi-cli -- check
          $output = cargo run --manifest-path "$env:GITHUB_WORKSPACE/Cargo.toml" -p skadi-cli -- run --target host --cc ${{ matrix.cc }}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($output -notmatch "7" -or $output -notmatch "systems matrix ok") {
              throw "Unexpected systems project output: $output"
          }

  core-tests:
    needs: [showcase-builds, quality-gates]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025-vs2026
            cc: gcc
          - os: macos-latest
            cc: clang
          - os: ubuntu-latest
            cc: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSYS2 GCC
        if: matrix.os == 'windows-2025-vs2026'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 GCC to PATH
        if: matrix.os == 'windows-2025-vs2026'
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Run tests except codegen_e2e
        run: cargo test --workspace -q -- --skip e2e_

      - name: skadi-cli doctor
        run: cargo run -p skadi-cli -- doctor

      - name: skadi-cli init/check/build on temp project
        shell: pwsh
        run: |
          $demoDir = Join-Path $env:RUNNER_TEMP "skadi_ci_demo"
          if (Test-Path $demoDir) {
            Remove-Item -Recurse -Force $demoDir
          }
          New-Item -ItemType Directory -Path $demoDir | Out-Null
          Set-Location $demoDir

          cargo run --manifest-path "$env:GITHUB_WORKSPACE/Cargo.toml" -p skadi-cli -- init
          cargo run --manifest-path "$env:GITHUB_WORKSPACE/Cargo.toml" -p skadi-cli -- check
          cargo run --manifest-path "$env:GITHUB_WORKSPACE/Cargo.toml" -p skadi-cli -- build --target host --cc ${{ matrix.cc }}

  codegen-e2e:
    needs: [showcase-builds, quality-gates]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSYS2 GCC
        if: matrix.os == 'windows-2025-vs2026'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 GCC to PATH
        if: matrix.os == 'windows-2025-vs2026'
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Run dedicated codegen e2e suite
        run: cargo test -q --test codegen_e2e
