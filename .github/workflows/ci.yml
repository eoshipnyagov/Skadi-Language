name: skadi-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup MSYS2 GCC (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 toolchain to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Root tests (non-e2e)
        run: cargo test -q -- --skip e2e_

      - name: CLI tests
        working-directory: tools/skadi-cli
        run: cargo test -q

      - name: Compiler smoke (emit C)
        run: cargo run -- --input examples/example_tree.skd --emit-c target/ci_tree.c

      - name: CLI doctor smoke
        working-directory: tools/skadi-cli
        run: cargo run -- doctor

  codegen-e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup MSYS2 GCC (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 toolchain to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Run codegen e2e suite
        run: cargo test -q --test codegen_e2e

  sanitizer-optional:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: ASan/UBSan e2e (optional gate)
        run: SKADI_ENABLE_SANITIZER_E2E=1 cargo test -q e2e_sanitized_runtime_stress_list_text_path --test codegen_e2e -- --nocapture

  valgrind-optional:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build C from Skadi
        run: cargo run -- --input benchmarks/bench_04_sum_ints.skd --emit-c target/valgrind_smoke.c

      - name: Valgrind smoke (optional gate)
        run: |
          gcc -g -O0 target/valgrind_smoke.c -o target/valgrind_smoke
          valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=101 ./target/valgrind_smoke
