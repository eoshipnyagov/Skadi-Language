name: CI

on:
  push:
  pull_request:

jobs:
  core-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cc: gcc
          - os: ubuntu-latest
            cc: gcc
          - os: macos-latest
            cc: clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSYS2 GCC
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 GCC to PATH
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Run tests except codegen_e2e
        run: cargo test -q -- --skip e2e_

      - name: Smoke transpile sample programs to C
        run: |
          cargo run -- --input examples/example_tree.skd --emit-c target/ci_example_tree.c
          cargo run -- --input benchmarks/bench_04_sum_ints.skd --emit-c target/ci_bench_04.c
          cargo run -- --input benchmarks/bench_08_path_list_helpers.skd --emit-c target/ci_bench_08.c

      - name: skadi-cli doctor
        run: cargo run --manifest-path tools/skadi-cli/Cargo.toml -- doctor

      - name: skadi-cli init/check/build on temp project
        shell: pwsh
        run: |
          $demoDir = Join-Path $env:RUNNER_TEMP "skadi_ci_demo"
          if (Test-Path $demoDir) {
            Remove-Item -Recurse -Force $demoDir
          }
          New-Item -ItemType Directory -Path $demoDir | Out-Null
          Set-Location $demoDir

          cargo run --manifest-path "$env:GITHUB_WORKSPACE/tools/skadi-cli/Cargo.toml" -- init
          cargo run --manifest-path "$env:GITHUB_WORKSPACE/tools/skadi-cli/Cargo.toml" -- check
          cargo run --manifest-path "$env:GITHUB_WORKSPACE/tools/skadi-cli/Cargo.toml" -- build --target host --cc ${{ matrix.cc }}

  codegen-e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSYS2 GCC
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add MSYS2 GCC to PATH
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH

      - name: Run dedicated codegen e2e suite
        run: cargo test -q --test codegen_e2e
